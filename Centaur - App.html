<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Centaur</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/centaur.css" />
<style>
html { background: var(--bg); }
body { background: var(--bg); }
.app-shell { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }

/* header */
.app-head { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between;
  padding: 14px clamp(18px, 5vw, 40px); border-bottom: 1px solid var(--line);
  background: oklch(0.985 0.004 255 / 0.85); backdrop-filter: blur(12px); }
.app-head .logo .word { font-size: 1.2rem; }
.app-head .logo .mark { width: 1.3em; height: 1.3em; }
.app-nav { display: flex; gap: 4px; }
.app-nav a { font-size: var(--t-sm); font-weight: 500; color: var(--ink-3); padding: 7px 13px; border-radius: 999px; transition: color 0.15s, background 0.15s; }
.app-nav a:hover { color: var(--ink); }
.app-nav a.on { color: var(--ink); background: var(--surface-2); }

/* main */
.app-main { flex: 1; display: flex; flex-direction: column; }
.screen { flex: 1; width: 100%; max-width: 720px; margin-inline: auto; padding: clamp(20px, 4vw, 48px) clamp(18px, 5vw, 40px) 48px; display: flex; flex-direction: column;
  animation: screen-in 0.4s var(--ease); }
@keyframes screen-in { from { opacity: 0; transform: translateY(8px); } }

/* focus ring (accent = state change) */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.task:focus-visible { outline: none; }

/* ---------------- Capture ---------------- */
.screen-capture { justify-content: center; }
.capture-inner { display: flex; flex-direction: column; flex: 1; }
.cap-top { padding-top: clamp(8px, 6vh, 64px); }
.instruction { font-family: var(--serif); font-weight: 400; font-size: var(--t-h1); letter-spacing: -0.02em; line-height: 1.1; max-width: 16ch; }
.instruction-sub { font-size: var(--t-lead); color: var(--ink-3); margin-top: 14px; max-width: 40ch; }
.cap-form { margin-top: auto; display: flex; flex-direction: column; gap: 16px; padding-top: 40px; }
.task { width: 100%; resize: none; font-family: var(--sans); font-size: 1.2rem; line-height: 1.5; color: var(--ink);
  background: var(--surface); border: 1px solid var(--line-2); border-radius: var(--r); padding: 18px 18px;
  transition: border-color 0.18s, box-shadow 0.18s; }
.task::placeholder { color: var(--ink-3); }
.task:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-tint); }
.cap-form .btn-primary { align-self: stretch; justify-content: center; }
.cap-form .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
@media (min-width: 720px) {
  .screen-capture { justify-content: center; }
  .capture-inner { flex: 0; }
  .cap-top { padding-top: 0; text-align: left; }
  .instruction { font-size: var(--t-hero); }
  .cap-form { margin-top: 0; }
  .cap-form .btn-primary { align-self: flex-start; }
}

/* ---------------- Classification (verdict) ---------------- */
.verdict-kicker, .empty-kicker, .drift-kicker, .logged-mark, .block-label, .log-label {
  font-family: var(--mono); font-size: var(--t-mono); letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); }
.verdict-cat { font-family: var(--serif); font-weight: 400; font-size: clamp(3.4rem, 1.5rem + 9vw, 6rem); letter-spacing: -0.03em; line-height: 0.95; margin-top: 8px; }
.verdict-meaning { font-size: var(--t-lead); color: var(--ink-2); margin-top: 12px; max-width: 44ch; }

/* the scale: position + weight, ink only, accent marker */
.scale { margin: 40px 0 8px; }
.scale-poles { display: flex; justify-content: space-between; font-family: var(--mono); font-size: var(--t-xs); color: var(--ink-3); margin-bottom: 14px; }
.scale-track { position: relative; height: 2px; background: var(--scale-track); margin: 26px 0; }
.scale-track .notch { position: absolute; top: -4px; width: 1px; height: 10px; background: var(--line-2); transform: translateX(-50%); }
.scale-fill-bar { position: absolute; left: 0; top: 0; height: 2px; background: var(--ink-3); transition: width 0.7s var(--ease); }
.scale-track .weight { position: absolute; top: 50%; width: 22px; height: 22px; background: var(--accent); border-radius: 4px;
  transform: translate(-50%, -50%) rotate(45deg); box-shadow: 0 0 0 5px var(--bg), var(--shadow-sm); transition: left 0.7s var(--ease); }
.scale-ticks { position: relative; height: 20px; }
.scale-ticks .ti { position: absolute; transform: translateX(-50%); font-family: var(--mono); font-size: var(--t-xs); color: var(--ink-3); white-space: nowrap; transition: color 0.3s, font-weight 0.3s; }
.scale-ticks .ti.on { color: var(--ink); font-weight: 500; }

.block { margin-top: 30px; padding-top: 22px; border-top: 1px solid var(--line); }
.block-label { margin-bottom: 8px; }
.block-body { font-size: var(--t-body); color: var(--ink); line-height: 1.6; max-width: 56ch; }
.verdict-task { margin-top: 28px; font-family: var(--mono); font-size: var(--t-xs); color: var(--ink-3); }
.verdict-task span { color: var(--ink-2); }
.verdict-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 32px; }
.btn-sm { padding: 0.5em 0.9em; font-size: var(--t-xs); }
.is-done { opacity: 0.45; pointer-events: none; }

.override-panel { margin-top: 22px; padding: 20px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); animation: screen-in 0.3s var(--ease); }
.override-opts { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.ov-opt { font-family: var(--sans); font-weight: 600; font-size: var(--t-sm); padding: 0.6em 1.1em; border-radius: 999px; border: 1px solid var(--line-2); color: var(--ink); transition: all 0.15s; }
.ov-opt:hover { border-color: var(--accent); background: var(--accent-tint); color: var(--accent-strong); }

/* logged confirmation */
.screen-logged { justify-content: center; text-align: left; }
.logged-cat { font-family: var(--serif); font-weight: 400; font-size: var(--t-hero); letter-spacing: -0.03em; margin-top: 10px; }
.logged-cat .corr { font-family: var(--sans); font-size: var(--t-sm); color: var(--ink-3); letter-spacing: 0; }
.logged-note { font-size: var(--t-lead); color: var(--ink-2); margin-top: 12px; }

/* ---------------- Empty state ---------------- */
.empty { padding-top: clamp(8px, 4vh, 40px); }
.empty-title { font-family: var(--serif); font-weight: 400; font-size: var(--t-h1); letter-spacing: -0.02em; margin-top: 10px; }
.empty-lead { font-size: var(--t-lead); color: var(--ink-2); margin-top: 14px; max-width: 48ch; }
.defs { display: grid; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; margin: 32px 0; }
.def { background: var(--bg); padding: 22px clamp(18px, 3vw, 26px); }
.def-name { font-family: var(--serif); font-weight: 500; font-size: var(--t-h3); margin: 12px 0 6px; }
.def-text { font-size: var(--t-sm); color: var(--ink-2); max-width: 56ch; }

/* mini scale glyph (form language, shared) */
.def-mini, .row-mini { position: relative; display: block; }
.def-mini { width: 120px; height: 16px; }
.mini-track { position: absolute; top: 50%; left: 0; right: 0; height: 1.5px; background: var(--scale-track); transform: translateY(-50%); }
.mini-w { position: absolute; top: 50%; width: 9px; height: 9px; background: var(--accent); border-radius: 2px; transform: translate(-50%, -50%) rotate(45deg); box-shadow: 0 0 0 3px var(--bg); }

/* ---------------- History ---------------- */
.drift { padding: clamp(26px, 4vw, 40px); border: 1px solid var(--line); border-radius: var(--r-lg); background: var(--surface); }
.drift-num { font-family: var(--serif); font-weight: 400; font-size: clamp(4rem, 2rem + 12vw, 7rem); line-height: 0.9; letter-spacing: -0.04em; color: var(--ink); margin: 10px 0; }
.drift-say { font-size: var(--t-lead); color: var(--ink-2); max-width: 44ch; }
.drift-off { background: var(--bg); }
.drift-off .drift-say { color: var(--ink-3); margin-top: 8px; }

.drift-controls { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin: 22px 0 8px; }
.toggle { display: inline-flex; align-items: center; gap: 12px; cursor: pointer; }
.toggle-label { font-size: var(--t-sm); color: var(--ink-2); font-weight: 500; }
.switch { width: 46px; height: 27px; border-radius: 999px; background: var(--scale-track); border: 1px solid var(--line-2); position: relative; transition: background 0.2s, border-color 0.2s; }
.switch i { position: absolute; top: 2px; left: 2px; width: 21px; height: 21px; border-radius: 50%; background: var(--bg); box-shadow: var(--shadow-sm); transition: transform 0.2s var(--ease); }
.switch[aria-checked="true"] { background: var(--accent); border-color: var(--accent); }
.switch[aria-checked="true"] i { transform: translateX(19px); }
.hist-tools { display: flex; gap: 8px; }

.log-label { margin: 34px 0 6px; display: flex; align-items: center; gap: 10px; }
.log-label .hr-num { text-transform: none; letter-spacing: 0; }
.log { list-style: none; padding: 0; margin: 0; }
.row { display: grid; grid-template-columns: 120px 1fr auto; gap: 16px; align-items: center; padding: 16px 0; border-top: 1px solid var(--line); }
.row-mini { width: 120px; height: 16px; }
.row-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.row-cat { font-weight: 600; font-size: var(--t-sm); }
.row-corr { font-family: var(--mono); font-size: var(--t-mono); color: var(--accent-strong); font-weight: 400; letter-spacing: 0.04em; }
.row-task { font-size: var(--t-sm); color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-time { font-family: var(--mono); font-size: var(--t-xs); color: var(--ink-3); white-space: nowrap; }
@media (max-width: 540px) {
  .row { grid-template-columns: 80px 1fr; grid-template-areas: "mini main" "mini time"; gap: 4px 14px; }
  .row-mini { width: 80px; grid-area: mini; align-self: center; }
  .row-main { grid-area: main; } .row-time { grid-area: time; }
}

/* footer note */
.app-foot { text-align: center; padding: 20px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: var(--t-mono); color: var(--ink-3); letter-spacing: 0.04em; }
.app-foot a { color: var(--ink-3); } .app-foot a:hover { color: var(--ink); }
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-head">
    <a class="logo" href="index.html" aria-label="Centaur home">
      <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path class="arc-off" d="M12 3 A 9 9 0 0 0 12 21" />
        <path class="arc-enh" d="M12 3 A 9 9 0 0 1 12 21" />
        <circle class="pip" cx="12" cy="3" r="2.4" />
      </svg>
      <span class="word">Centaur</span>
    </a>
    <nav class="app-nav">
      <a href="#" id="nav-capture" class="on">Capture</a>
      <a href="#" id="nav-history">History</a>
    </nav>
  </header>

  <main class="app-main">
    <div id="app" class="screen"></div>
  </main>

  <footer class="app-foot">
    Local only. Reads patterns, never keystrokes. <a href="Centaur — Brand Guide.html">Brand</a>
  </footer>
</div>

<script src="app/centaur.js"></script>
</body>
</html>
